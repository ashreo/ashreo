name: Generate Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Profile Summary Cards
        uses: vn7n24fez6k/github-profile-summary-cards@v0.6.1
        with:
          USERNAME: ashreo
          BRANCH_NAME: main
          UTC_OFFSET: 8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
